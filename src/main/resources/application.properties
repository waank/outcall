spring.application.name=outcall
env=test
spring.main.allow-circular-references=true

app.database.type=h2
app.cache.type=local
app.lock.type=local
app.queue.group.cache.type=local

spring.datasource.mysql.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.mysql.url=jdbc:mysql://localhost:3306/outcall?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.mysql.username=root
spring.datasource.mysql.password=root

spring.datasource.h2.driver-class-name=org.h2.Driver
spring.datasource.h2.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.h2.username=sa
spring.datasource.h2.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.global-config.db-config.id-type=auto

outcall.large-tenant-ids=INSTANCE_VIP_001
outcall.large-task.min-queue-count=5000
outcall.slot.global-capacity=160
outcall.slot.default-tenant-capacity=40
outcall.slot.normal-tenant-capacity=20
outcall.slot.vip-tenant-capacity=100
outcall.slot.default-task-capacity=20
outcall.slot.vip-task-capacity=80
outcall.slot.normal-elastic.enabled=true
outcall.slot.normal-elastic.global-idle-threshold=80
outcall.slot.normal-elastic.tenant-extra-slots=10
outcall.slot.normal-elastic.task-extra-slots=10
outcall.slot.normal-elastic.max-tenant-capacity=40
outcall.slot.normal-elastic.max-task-capacity=30
outcall.queue.import.batch-size=200
outcall.queue.import.max-parallelism=4
