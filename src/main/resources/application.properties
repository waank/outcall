spring.application.name=outcall
env=test
spring.main.allow-circular-references=true

# 数据库类型配置: mysql 或 h2
app.database.type=h2

# 缓存类型配置: local(本地缓存) 或 redis(Redis缓存)
app.cache.type=local

# 锁类型配置: local(本地锁) 或 redis(Redis锁)
app.lock.type=local

# 队列组缓存类型配置: local(本地缓存) 或 redis(Redis缓存)
app.queue.group.cache.type=local

# MySQL DataSource 配置
spring.datasource.mysql.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.mysql.url=jdbc:mysql://localhost:3306/outcall?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.mysql.username=root
spring.datasource.mysql.password=root

# H2 内存数据库配置
spring.datasource.h2.driver-class-name=org.h2.Driver
spring.datasource.h2.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.h2.username=sa
spring.datasource.h2.password=

# H2 控制台 (仅开发环境启用)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# MyBatis-Plus 配置
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.global-config.db-config.id-type=auto
